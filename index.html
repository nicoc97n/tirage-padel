<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PADEL DRAW — Tirage au Sort</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0e1a;
    --bg-card: #111827;
    --bg-card-hover: #1a2237;
    --gold: #d4af37;
    --gold-light: #f0d060;
    --gold-dark: #b8941e;
    --silver: #c0c0c0;
    --accent-blue: #1e3a5f;
    --accent-glow: rgba(212, 175, 55, 0.25);
    --text: #f0ece2;
    --text-dim: #8a9bb5;
    --danger: #e74c3c;
    --success: #2ecc71;
    --team-a: #1a5276;
    --team-b: #7b241c;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(212,175,55,0.3), transparent),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1.5px 1.5px at 60% 20%, rgba(212,175,55,0.2), transparent),
      radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.12), transparent),
      radial-gradient(1px 1px at 10% 80%, rgba(212,175,55,0.15), transparent),
      radial-gradient(1.5px 1.5px at 90% 40%, rgba(255,255,255,0.1), transparent),
      radial-gradient(1px 1px at 50% 50%, rgba(212,175,55,0.1), transparent),
      radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,0.08), transparent);
    background-size: 550px 550px, 350px 350px, 250px 250px, 450px 450px, 300px 300px, 500px 500px, 400px 400px, 600px 600px;
    pointer-events: none;
    z-index: 0;
    animation: starDrift 60s linear infinite;
  }

  @keyframes starDrift {
    to { background-position: 550px 550px, -350px 350px, 250px -250px, -450px 450px, 300px -300px, -500px 500px, 400px 400px, -600px 600px; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }

  .logo-icon {
    width: 72px; height: 72px;
    margin: 0 auto 16px;
    background: radial-gradient(circle at 30% 30%, var(--gold-light), var(--gold-dark));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px rgba(212,175,55,0.3), 0 0 80px rgba(212,175,55,0.1);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(212,175,55,0.3), 0 0 80px rgba(212,175,55,0.1); }
    50% { box-shadow: 0 0 60px rgba(212,175,55,0.5), 0 0 120px rgba(212,175,55,0.2); }
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 7vw, 4.5rem);
    letter-spacing: 6px;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1;
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 300;
  }

  /* PHASE SELECTOR */
  .phase-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 30px auto 36px;
    max-width: 600px;
    background: var(--bg-card);
    border-radius: 50px;
    padding: 4px;
    border: 1px solid rgba(212,175,55,0.15);
  }

  .phase-step {
    flex: 1;
    text-align: center;
    padding: 10px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-radius: 50px;
    cursor: default;
    transition: all 0.4s;
  }

  .phase-step.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    box-shadow: 0 4px 20px rgba(212,175,55,0.3);
  }

  .phase-step.done {
    color: var(--gold);
  }

  /* SECTIONS */
  .section {
    display: none;
    animation: fadeUp 0.6s ease;
  }
  .section.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CARDS */
  .card {
    background: var(--bg-card);
    border: 1px solid rgba(212,175,55,0.12);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 20px;
  }

  /* PLAYER COUNT SELECTOR */
  .count-selector {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .count-btn {
    width: 80px; height: 80px;
    border-radius: var(--radius);
    border: 2px solid rgba(212,175,55,0.2);
    background: var(--bg-card);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
  }

  .count-btn span {
    font-family: 'Outfit', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .count-btn:hover {
    border-color: var(--gold);
    background: var(--bg-card-hover);
    transform: translateY(-2px);
  }

  .count-btn.selected {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(212,175,55,0.05));
    box-shadow: 0 0 30px rgba(212,175,55,0.15);
  }

  /* PLAYER INPUTS */
  .player-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 560px) {
    .player-grid { grid-template-columns: 1fr; }
  }

  .player-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 14px;
    transition: all 0.3s;
    animation: slotIn 0.4s ease both;
  }

  .player-input-row:hover {
    border-color: rgba(212,175,55,0.25);
    background: rgba(255,255,255,0.05);
  }

  @keyframes slotIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .player-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--gold);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .player-input-row input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    outline: none;
    padding: 6px 0;
  }

  .player-input-row input[type="text"]::placeholder {
    color: rgba(255,255,255,0.2);
  }

  .captain-toggle {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.2);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.3s;
    flex-shrink: 0;
    color: rgba(212,175,55,0.3);
  }

  .captain-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .captain-toggle.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border-color: var(--gold);
    color: var(--bg-deep);
    box-shadow: 0 0 15px rgba(212,175,55,0.4);
  }

  .captain-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-bottom: 24px;
    font-style: italic;
  }

  .captain-hint strong { color: var(--gold); font-style: normal; }

  /* BUTTONS */
  .btn-primary {
    display: block;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    padding: 16px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 4px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    color: var(--bg-deep);
    box-shadow: 0 4px 30px rgba(212,175,55,0.3);
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .btn-primary:hover::before { transform: translateX(100%); }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(212,175,55,0.5);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    display: inline-block;
    padding: 12px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 3px;
    border: 1px solid var(--gold);
    border-radius: 50px;
    cursor: pointer;
    background: transparent;
    color: var(--gold);
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    background: rgba(212,175,55,0.1);
    box-shadow: 0 0 20px rgba(212,175,55,0.15);
  }

  /* DRAW ANIMATION */
  .draw-stage {
    text-align: center;
    padding: 40px 0;
  }

  .draw-bowl {
    width: 180px; height: 180px;
    margin: 0 auto 30px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    background: radial-gradient(circle at 40% 40%, rgba(212,175,55,0.1), transparent 70%);
    animation: bowlGlow 2s ease-in-out infinite;
  }

  @keyframes bowlGlow {
    0%, 100% { box-shadow: 0 0 30px rgba(212,175,55,0.2), inset 0 0 30px rgba(212,175,55,0.05); }
    50% { box-shadow: 0 0 60px rgba(212,175,55,0.4), inset 0 0 50px rgba(212,175,55,0.1); }
  }

  .bowl-ball {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    color: var(--bg-deep);
    box-shadow: 0 2px 10px rgba(212,175,55,0.5);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .draw-name-reveal {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 4px;
    color: var(--gold);
    min-height: 60px;
    display: flex; align-items: center; justify-content: center;
  }

  .draw-team-label {
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* RESULTS */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 30px;
  }

  @media (max-width: 560px) {
    .results-grid { grid-template-columns: 1fr; }
  }

  .team-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    animation: teamReveal 0.6s ease both;
    opacity: 0;
  }

  @keyframes teamReveal {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .team-header {
    padding: 14px 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    display: flex; align-items: center; gap: 10px;
  }

  .team-header .team-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .team-players {
    padding: 12px 18px 18px;
  }

  .team-player {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .team-player:last-child { border-bottom: none; }

  .team-player .player-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
  }

  .team-player .player-name {
    font-weight: 600;
    font-size: 1rem;
  }

  .team-player .captain-badge {
    margin-left: auto;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--bg-deep);
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 700;
  }

  /* BRACKET (4 or 8 players) */
  .bracket-container {
    margin: 30px 0;
    overflow-x: auto;
    padding-bottom: 10px;
  }

  .bracket {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    min-width: fit-content;
    margin: 0 auto;
  }

  .bracket-round {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
    padding: 0 10px;
  }

  .bracket-match {
    background: var(--bg-card);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 10px;
    overflow: hidden;
    min-width: 200px;
    animation: matchReveal 0.5s ease both;
    opacity: 0;
  }

  @keyframes matchReveal {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .bracket-team {
    padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s;
  }

  .bracket-team:last-child { border-bottom: none; }

  .bracket-team .seed {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    color: var(--gold);
    width: 24px;
    text-align: center;
  }

  .bracket-connector {
    width: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .bracket-label {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
    color: var(--gold);
    font-size: 1rem;
    margin-bottom: 14px;
  }

  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    color: var(--gold);
    letter-spacing: 2px;
    text-align: center;
    padding: 4px 0;
    background: rgba(212,175,55,0.08);
  }

  /* MATCH ORDER (6 players) */
  .match-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .match-item {
    background: var(--bg-card);
    border: 1px solid rgba(212,175,55,0.12);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    animation: matchSlide 0.5s ease both;
    opacity: 0;
  }

  @keyframes matchSlide {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .match-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold);
    width: 50px;
    text-align: center;
    flex-shrink: 0;
  }

  .match-teams {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .match-team-block {
    text-align: center;
    min-width: 100px;
  }

  .match-team-block .team-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .match-team-block .team-names {
    font-weight: 600;
    font-size: 1rem;
  }

  .match-vs {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    color: var(--gold);
    letter-spacing: 2px;
  }

  /* TEAM COLORS */
  .tc-0 .team-header { background: linear-gradient(135deg, #1a5276, #154360); }
  .tc-0 .team-badge, .tc-0 .player-avatar { background: #1a5276; color: #fff; }
  .tc-1 .team-header { background: linear-gradient(135deg, #7b241c, #641e16); }
  .tc-1 .team-badge, .tc-1 .player-avatar { background: #7b241c; color: #fff; }
  .tc-2 .team-header { background: linear-gradient(135deg, #196f3d, #145a32); }
  .tc-2 .team-badge, .tc-2 .player-avatar { background: #196f3d; color: #fff; }
  .tc-3 .team-header { background: linear-gradient(135deg, #7d6608, #6c5b07); }
  .tc-3 .team-badge, .tc-3 .player-avatar { background: #7d6608; color: #fff; }

  .bt-0 .bracket-team:first-child { border-left: 3px solid #1a5276; }
  .bt-0 .bracket-team:last-child { border-left: 3px solid #7b241c; }
  .bt-1 .bracket-team:first-child { border-left: 3px solid #196f3d; }
  .bt-1 .bracket-team:last-child { border-left: 3px solid #7d6608; }

  .bt-final .bracket-team:first-child { border-left: 3px solid var(--gold); }
  .bt-final .bracket-team:last-child { border-left: 3px solid var(--silver); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    z-index: 100;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ACTIONS BAR */
  .actions-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 30px;
  }

  /* ERROR */
  .error-msg {
    text-align: center;
    color: var(--danger);
    font-size: 0.9rem;
    margin-top: 10px;
    min-height: 24px;
  }

  /* WAIT TEXT */
  .wait-text {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Smooth scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-icon">🏆</div>
    <h1>PADEL DRAW</h1>
    <div class="subtitle">Tirage au sort officiel</div>
  </div>

  <!-- PHASE BAR -->
  <div class="phase-bar">
    <div class="phase-step active" id="step1">① Joueurs</div>
    <div class="phase-step" id="step2">② Tirage</div>
    <div class="phase-step" id="step3">③ Résultat</div>
  </div>

  <!-- SECTION 1: SETUP -->
  <div class="section active" id="sectionSetup">
    <div class="card">
      <div class="card-title">Nombre de joueurs</div>
      <div class="count-selector">
        <button class="count-btn selected" onclick="selectCount(4)" id="cb4">
          4
          <span>joueurs</span>
        </button>
        <button class="count-btn" onclick="selectCount(6)" id="cb6">
          6
          <span>joueurs</span>
        </button>
        <button class="count-btn" onclick="selectCount(8)" id="cb8">
          8
          <span>joueurs</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Joueurs</div>
      <p class="captain-hint">Cliquez sur <strong>★</strong> pour désigner un capitaine — les capitaines seront séparés dans des équipes différentes</p>
      <div class="player-grid" id="playerGrid"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <button class="btn-primary" onclick="startDraw()">Lancer le tirage</button>
  </div>

  <!-- SECTION 2: DRAW ANIMATION -->
  <div class="section" id="sectionDraw">
    <div class="draw-stage">
      <div class="draw-bowl" id="drawBowl"></div>
      <div class="draw-team-label" id="drawTeamLabel"></div>
      <div class="draw-name-reveal" id="drawNameReveal"></div>
      <div class="wait-text" id="drawWait">Tirage en cours…</div>
    </div>
  </div>

  <!-- SECTION 3: RESULTS -->
  <div class="section" id="sectionResults">
    <div class="card">
      <div class="card-title">Équipes</div>
      <div class="results-grid" id="resultsGrid"></div>
    </div>

    <div id="bracketArea"></div>

    <div class="actions-bar">
      <button class="btn-secondary" onclick="resetAll()">Nouveau tirage</button>
      <button class="btn-secondary" onclick="reshuffleOnly()">Re-tirer</button>
    </div>
  </div>

</div>

<script>
  let playerCount = 4;
  let teams = [];
  const teamNames = ['BLUE STORM', 'RED FIRE', 'GREEN FORCE', 'GOLD RUSH'];
  const teamEmojis = ['🔵', '🔴', '🟢', '🟡'];

  function selectCount(n) {
    playerCount = n;
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('cb' + n).classList.add('selected');
    buildPlayerInputs();
  }

  function buildPlayerInputs() {
    const grid = document.getElementById('playerGrid');
    grid.innerHTML = '';
    for (let i = 0; i < playerCount; i++) {
      const row = document.createElement('div');
      row.className = 'player-input-row';
      row.style.animationDelay = (i * 0.06) + 's';
      row.innerHTML = `
        <div class="player-number">${i + 1}</div>
        <input type="text" id="pname${i}" placeholder="Joueur ${i + 1}" maxlength="20"
               onkeydown="if(event.key==='Enter'){
                 const next=document.getElementById('pname${i+1}');
                 if(next)next.focus();
                 else startDraw();
               }">
        <button class="captain-toggle" id="pcap${i}" onclick="toggleCaptain(${i})" title="Capitaine">★</button>
      `;
      grid.appendChild(row);
    }
  }

  function toggleCaptain(i) {
    document.getElementById('pcap' + i).classList.toggle('active');
  }

  function getPlayers() {
    const players = [];
    for (let i = 0; i < playerCount; i++) {
      const name = document.getElementById('pname' + i).value.trim() || ('Joueur ' + (i + 1));
      const isCaptain = document.getElementById('pcap' + i).classList.contains('active');
      players.push({ name, isCaptain, index: i });
    }
    return players;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function formTeams(players) {
    const numTeams = playerCount / 2;
    const captains = shuffle(players.filter(p => p.isCaptain));
    const others = shuffle(players.filter(p => !p.isCaptain));

    const t = Array.from({ length: numTeams }, () => []);

    // Place captains in separate teams
    captains.forEach((cap, idx) => {
      t[idx % numTeams].push(cap);
    });

    // Fill remaining
    let teamIdx = 0;
    const remaining = [...others];
    // Also add excess captains that couldn't be separated
    // (already handled by modulo)

    for (const p of remaining) {
      // Find team with fewest players
      let minLen = Infinity, minIdx = 0;
      for (let i = 0; i < numTeams; i++) {
        if (t[i].length < minLen) { minLen = t[i].length; minIdx = i; }
      }
      t[minIdx].push(p);
    }

    return t;
  }

  function startDraw() {
    const players = getPlayers();
    const names = players.map(p => p.name);
    const unique = new Set(names);
    const err = document.getElementById('errorMsg');

    if (unique.size < playerCount) {
      err.textContent = 'Chaque joueur doit avoir un nom unique.';
      return;
    }

    const captains = players.filter(p => p.isCaptain);
    const numTeams = playerCount / 2;
    if (captains.length > numTeams) {
      err.textContent = `Trop de capitaines ! Maximum ${numTeams} pour ${numTeams} équipes.`;
      return;
    }

    err.textContent = '';
    teams = formTeams(players);
    showPhase(2);
    runDrawAnimation(players);
  }

  function showPhase(n) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.phase-step').forEach(s => s.classList.remove('active', 'done'));

    if (n === 1) {
      document.getElementById('sectionSetup').classList.add('active');
      document.getElementById('step1').classList.add('active');
    } else if (n === 2) {
      document.getElementById('sectionDraw').classList.add('active');
      document.getElementById('step1').classList.add('done');
      document.getElementById('step2').classList.add('active');
    } else {
      document.getElementById('sectionResults').classList.add('active');
      document.getElementById('step1').classList.add('done');
      document.getElementById('step2').classList.add('done');
      document.getElementById('step3').classList.add('active');
    }
  }

  async function runDrawAnimation(players) {
    const bowl = document.getElementById('drawBowl');
    const reveal = document.getElementById('drawNameReveal');
    const teamLabel = document.getElementById('drawTeamLabel');
    const wait = document.getElementById('drawWait');

    // Create balls in bowl
    bowl.innerHTML = '';
    const allPlayers = shuffle(players);
    const ballPositions = [];
    const radius = 50;

    allPlayers.forEach((p, i) => {
      const angle = (2 * Math.PI * i) / allPlayers.length;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      const ball = document.createElement('div');
      ball.className = 'bowl-ball';
      ball.textContent = p.name.charAt(0).toUpperCase();
      ball.style.transform = `translate(${x}px, ${y}px)`;
      ball.id = 'ball_' + i;
      bowl.appendChild(ball);
      ballPositions.push({ el: ball, x, y });
    });

    // Spinning animation
    let spinAngle = 0;
    const spinInterval = setInterval(() => {
      spinAngle += 0.08;
      allPlayers.forEach((p, i) => {
        const angle = (2 * Math.PI * i) / allPlayers.length + spinAngle;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        const ball = document.getElementById('ball_' + i);
        if (ball) ball.style.transform = `translate(${x}px, ${y}px)`;
      });
    }, 30);

    await sleep(1500);

    // Reveal each team
    for (let t = 0; t < teams.length; t++) {
      teamLabel.textContent = teamNames[t];
      teamLabel.style.color = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f'][t];

      for (let p = 0; p < teams[t].length; p++) {
        reveal.textContent = '';
        reveal.style.opacity = 0;

        await sleep(800);

        // Reveal name with animation
        reveal.textContent = teams[t][p].name;
        reveal.style.opacity = 1;
        reveal.style.animation = 'none';
        reveal.offsetHeight; // reflow
        reveal.style.animation = 'fadeUp 0.5s ease';

        // Remove a ball
        const remainingBalls = bowl.querySelectorAll('.bowl-ball');
        if (remainingBalls.length > 0) {
          const ballToRemove = remainingBalls[0];
          ballToRemove.style.transform = 'translate(0, -150px) scale(0)';
          ballToRemove.style.opacity = '0';
          setTimeout(() => ballToRemove.remove(), 600);
        }

        await sleep(1200);
      }

      await sleep(600);
    }

    clearInterval(spinInterval);
    wait.textContent = 'Tirage terminé !';
    wait.style.animation = 'none';
    wait.style.color = 'var(--gold)';

    await sleep(1000);
    showResults();
  }

  function showResults() {
    showPhase(3);
    launchConfetti();

    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';

    teams.forEach((team, t) => {
      const card = document.createElement('div');
      card.className = `team-card tc-${t}`;
      card.style.animationDelay = (t * 0.15) + 's';

      let playersHtml = '';
      team.forEach(p => {
        const initial = p.name.charAt(0).toUpperCase();
        playersHtml += `
          <div class="team-player">
            <div class="player-avatar">${initial}</div>
            <div class="player-name">${p.name}</div>
            ${p.isCaptain ? '<div class="captain-badge">★ Capitaine</div>' : ''}
          </div>
        `;
      });

      card.innerHTML = `
        <div class="team-header">
          <div class="team-badge">${teamEmojis[t]}</div>
          ${teamNames[t]}
        </div>
        <div class="team-players">${playersHtml}</div>
      `;
      grid.appendChild(card);
    });

    // Build bracket or match order
    const area = document.getElementById('bracketArea');
    area.innerHTML = '';

    if (playerCount === 4) {
      buildBracket4(area);
    } else if (playerCount === 8) {
      buildBracket8(area);
    } else if (playerCount === 6) {
      buildMatchOrder6(area);
    }
  }

  function teamDisplay(t) {
    return teams[t].map(p => p.name).join(' & ');
  }

  function buildBracket4(area) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-title">Tableau</div>`;

    const bracket = document.createElement('div');
    bracket.className = 'bracket-container';
    bracket.innerHTML = `
      <div class="bracket">
        <div class="bracket-round">
          <div class="bracket-label">Match</div>
          <div class="bracket-match bt-0" style="animation-delay:0.3s">
            <div class="bracket-team"><span class="seed">1</span>${teamDisplay(0)}</div>
            <div class="vs-badge">VS</div>
            <div class="bracket-team"><span class="seed">2</span>${teamDisplay(1)}</div>
          </div>
        </div>
      </div>
    `;

    card.appendChild(bracket);
    area.appendChild(card);
  }

  function buildBracket8(area) {
    // 4 teams → semi-finals + final
    const matchups = shuffle([0, 1, 2, 3]);
    const s1a = matchups[0], s1b = matchups[1];
    const s2a = matchups[2], s2b = matchups[3];

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-title">Tableau</div>`;

    const bracket = document.createElement('div');
    bracket.className = 'bracket-container';
    bracket.innerHTML = `
      <div class="bracket">
        <div class="bracket-round">
          <div class="bracket-label">Demi-finales</div>
          <div class="bracket-match bt-0" style="animation-delay:0.3s">
            <div class="bracket-team"><span class="seed">1</span>${teamDisplay(s1a)}</div>
            <div class="vs-badge">VS</div>
            <div class="bracket-team"><span class="seed">2</span>${teamDisplay(s1b)}</div>
          </div>
          <div class="bracket-match bt-1" style="animation-delay:0.5s">
            <div class="bracket-team"><span class="seed">3</span>${teamDisplay(s2a)}</div>
            <div class="vs-badge">VS</div>
            <div class="bracket-team"><span class="seed">4</span>${teamDisplay(s2b)}</div>
          </div>
        </div>
        <div class="bracket-connector">
          <svg width="40" height="160" viewBox="0 0 40 160">
            <path d="M0,40 L20,40 L20,120 L0,120" stroke="var(--gold)" stroke-width="1.5" fill="none" opacity="0.4"/>
            <path d="M20,80 L40,80" stroke="var(--gold)" stroke-width="1.5" fill="none" opacity="0.4"/>
          </svg>
        </div>
        <div class="bracket-round">
          <div class="bracket-label">Finale</div>
          <div class="bracket-match bt-final" style="animation-delay:0.8s">
            <div class="bracket-team"><span class="seed">🏆</span> Vainqueur Match 1</div>
            <div class="vs-badge">VS</div>
            <div class="bracket-team"><span class="seed">🏆</span> Vainqueur Match 2</div>
          </div>
        </div>
      </div>
    `;

    card.appendChild(bracket);
    area.appendChild(card);
  }

  function buildMatchOrder6(area) {
    // 3 teams, 3 matches: each team plays the other two
    const matches = shuffle([
      [0, 1, 2], // team0 vs team1, team2 waits
      [0, 2, 1], // team0 vs team2, team1 waits
      [1, 2, 0], // team1 vs team2, team0 waits
    ]);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-title">Ordre des matchs</div>`;

    const list = document.createElement('div');
    list.className = 'match-list';

    matches.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'match-item';
      item.style.animationDelay = (0.3 + i * 0.2) + 's';
      item.innerHTML = `
        <div class="match-number">${i + 1}</div>
        <div class="match-teams">
          <div class="match-team-block">
            <div class="team-label">${teamNames[m[0]]}</div>
            <div class="team-names">${teamDisplay(m[0])}</div>
          </div>
          <div class="match-vs">VS</div>
          <div class="match-team-block">
            <div class="team-label">${teamNames[m[1]]}</div>
            <div class="team-names">${teamDisplay(m[1])}</div>
          </div>
        </div>
      `;
      list.appendChild(item);
    });

    card.appendChild(list);

    // Add a note about who's resting
    const note = document.createElement('p');
    note.style.cssText = 'text-align:center; color:var(--text-dim); font-size:0.85rem; margin-top:16px; font-style:italic;';
    note.innerHTML = matches.map((m, i) =>
      `Match ${i + 1} : <strong style="color:var(--gold)">${teamNames[m[2]]}</strong> se repose`
    ).join(' &nbsp;•&nbsp; ');
    card.appendChild(note);

    area.appendChild(card);
  }

  function launchConfetti() {
    const colors = ['#d4af37', '#f0d060', '#e74c3c', '#3498db', '#2ecc71', '#fff'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (2 + Math.random() * 3) + 's';
      piece.style.animationDelay = (Math.random() * 1.5) + 's';
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 6000);
    }
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function resetAll() {
    showPhase(1);
    buildPlayerInputs();
  }

  function reshuffleOnly() {
    const players = getPlayers();
    teams = formTeams(players);
    showPhase(2);
    runDrawAnimation(players);
  }

  // Init
  buildPlayerInputs();
</script>
</body>
</html>
